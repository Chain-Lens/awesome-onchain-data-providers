name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate providers
        run: npm run validate

      - name: Verify README is generated
        run: |
          npm run build:readme
          git diff --exit-code README.md

      - name: Verify dist outputs are generated
        run: |
          npm run build:dist
          git diff --exit-code dist/providers.json dist/chainlens-intents.json

      - name: Report stale provider metadata
        run: npm run report:stale

  weekly-url-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate provider URLs
        run: npm run validate:urls
